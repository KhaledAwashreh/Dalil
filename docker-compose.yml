# Dalil — Docker Compose
# Usage:
#   docker compose up              # production mode
#   docker compose --profile dev up  # development mode (mounts local source)

services:
  # ---- MuninnDB — cognitive memory database ----
  muninndb:
    image: ghcr.io/scrypster/muninndb:latest
    container_name: dalil-muninndb
    environment:
      # Embedding — set EMBED_PROVIDER and EMBED_API_KEY in .env
      # Supported: MUNINN_JINA_KEY, MUNINN_OPENAI_KEY, MUNINN_COHERE_KEY, etc.
      MUNINN_OPENAI_KEY: "${EMBED_API_KEY:-}"
    ports:
      - "8000:8000"   # Dalil API (shared network namespace)
      - "8474:8474"   # Internal API
      - "8475:8475"   # REST API
      - "8476:8476"   # Web UI / Dashboard
      - "8477:8477"   # gRPC
      - "8750:8750"   # MCP (AI tool integration)
    volumes:
      - muninndb-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8476 || exit 0"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

  # ---- Dalil API — consulting memory system ----
  dalil-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dalil-api
    environment:
      # MuninnDB connection — share network namespace with muninndb container
      MUNINN_URL: "http://127.0.0.1:8476"
      MUNINN_TOKEN: "${MUNINN_TOKEN:-}"

      # LLM configuration — set in config.json or via env vars
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_BASE_URL: "${LLM_BASE_URL:-}"
      LLM_MODEL: "${LLM_MODEL:-}"

      # Config file — mounted into container
      DALIL_CONFIG: "/app/config.json"
    volumes:
      - dalil-logs:/app/logs
      - ./.dalil:/app/.dalil:ro
      - ./config.json:/app/config.json:ro
    # Share MuninnDB's network namespace so 127.0.0.1 reaches MuninnDB
    network_mode: "service:muninndb"
    depends_on:
      muninndb:
        condition: service_healthy
    restart: unless-stopped

  # ---- Dalil API — development mode (local source mounted) ----
  dalil-api-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dalil-api-dev
    profiles:
      - dev
    environment:
      MUNINN_URL: "http://127.0.0.1:8476"
      MUNINN_TOKEN: "${MUNINN_TOKEN:-}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_BASE_URL: "${LLM_BASE_URL:-}"
      LLM_MODEL: "${LLM_MODEL:-}"
      DALIL_CONFIG: "/app/config.json"
    volumes:
      # Mount local source for live editing — changes reflect immediately
      - ./dalil:/app/dalil
      - dalil-logs:/app/logs
      - ./.dalil:/app/.dalil:ro
      - ./config.json:/app/config.json:ro
    network_mode: "service:muninndb"
    depends_on:
      muninndb:
        condition: service_healthy
    restart: unless-stopped
    # Uvicorn with --reload for auto-restart on file changes
    command: ["uvicorn", "dalil.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  muninndb-data:
    driver: local
  dalil-logs:
    driver: local
